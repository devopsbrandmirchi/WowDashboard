name: Refresh Subscription Cache

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install psycopg2-binary

      - name: Refresh cache
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python refresh_cache.py